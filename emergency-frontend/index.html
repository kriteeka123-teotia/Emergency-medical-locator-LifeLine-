<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeLine | Medical Emergency Locator</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav>
        <div class="logo"><i class="fas fa-heartbeat"></i> LifeLine</div>
        <div class="nav-links">

            <a href="login.html">Login</a>
            <a href="register.html" class="btn-main" style="color:white">Join Network</a>
