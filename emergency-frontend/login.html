<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | LifeLine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-box auth-card">
        <h2 style="text-align:center; color:#e53935">Welcome Back</h2>
        <form onsubmit="loginUser(event)">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-main">Login to Dashboard</button>
        </form>
        <p style="text-align:center; margin-top:15px">New here? <a href="register.html">Register</a></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
