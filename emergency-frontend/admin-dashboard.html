<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | LifeLine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-grid">
        <aside class="sidebar" style="background: #2d3436; color: white;">
            <div class="logo" style="color: white; margin-bottom: 40px;"><i class="fas fa-shield-alt"></i> Admin</div>
            <nav class="nav-links" style="display: flex; flex-direction: column; gap: 20px;">
                <a href="#" style="color: white;"><i class="fas fa-users"></i> Providers</a>
                <a href="index.html" onclick="localStorage.clear()" style="color: #ff7675;"><i class="fas fa-power-off"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Global Network Oversight</h1>
            <div class="card" style="margin-top: 30px;">
                <h3>Pending Provider Verifications</h3>
                <table>
                    <thead>
                        <tr><th>Name</th><th>Type</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
